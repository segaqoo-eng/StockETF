<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockETF — 台灣 ETF 交叉持股分析</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="header">
    <h1>📊 Stock<span>ETF</span></h1>
    <div class="header-sub">主動式 ETF 交叉持股分析（+ 0050 對照） · 更新於 <b id="updated-at">—</b></div>
  </header>

  <nav id="etf-chip-bar" class="etf-chip-bar" aria-label="ETF 列表，點選查看持股明細">
    <span class="loading">載入中…</span>
  </nav>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="cross">交叉持股</button>
    <button class="tab-btn" data-tab="etfs">ETF 總覽</button>
    <button class="tab-btn" data-tab="changes">持股變化</button>
  </nav>

  <main class="container">
    <section id="tab-cross" class="tab-panel active">
      <div class="filters">
        <label>最少被持有 <select id="filter-min-etfs">
          <option value="1">1 檔以上</option>
          <option value="2">2 檔以上</option>
          <option value="3" selected>3 檔以上</option>
          <option value="4">4 檔以上</option>
        </select></label>
        <label>產業 <select id="filter-industry"><option value="">全部</option></select></label>
        <input type="search" id="filter-search" placeholder="搜尋股票代號或名稱…">
      </div>

      <div id="cross-holdings-table" class="table-wrap">
        <p class="loading">載入中…</p>
      </div>
    </section>

    <section id="tab-etfs" class="tab-panel">
      <div id="etf-overview" class="etf-overview"></div>
    </section>

    <section id="tab-changes" class="tab-panel">
      <div class="changes-intro">
        📊 比對歷史快照，看各檔 ETF 經理人在期間內「加碼」與「減碼」最多的個股。
        <small>顯示的數值是<b>持股權重 %</b> 的變動（不是股價漲跌）。多檔 ETF 同方向異動的個股，「強度」與「共識度」皆高。</small>
      </div>
      <section id="leaderboard" class="leaderboard" aria-label="持股權重變化排行"></section>
    </section>
  </main>

  <footer class="footer">
    <p>資訊僅供參考，不構成投資建議。資料來源：各 ETF 發行商官網。</p>
    <p><a href="https://github.com/your-user/StockETF" target="_blank" rel="noopener">GitHub 原始碼</a></p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
